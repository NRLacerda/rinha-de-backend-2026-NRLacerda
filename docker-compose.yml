services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "6MB"

  api1:
    image: ghcr.io/nrlacerda/rinha-de-backend-2026-api:latest
    environment:
      - GOGC=400
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "172MB"

  api2:
    image: ghcr.io/nrlacerda/rinha-de-backend-2026-api:latest
    environment:
      - GOGC=400
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "172MB"

networks:
  default:
    driver: bridge